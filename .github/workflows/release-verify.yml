name: Release Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify-release:
    name: Verify Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run verify:release

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start app for entity E2E
        run: |
          npm run start -- -p 3001 > /tmp/queeratlas-start.log 2>&1 &
          echo "APP_PID=$!" >> "$GITHUB_ENV"
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:3001" > /dev/null; then
              echo "App is up on :3001"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          cat /tmp/queeratlas-start.log || true
          exit 1

      - name: Run event entity browser verification
        env:
          BASE_URL: http://127.0.0.1:3001
          EVENT_ENTITY_TEST_PATHS: /bilbao/events/zinegoak-2026--seed-event-bilbao-zinegoak-2026,/tallinn/events/baltic-pride-tallinn-2026--seed-event-tallinn-baltic-pride-week-2026,/naples/events/napoli-pride-2026--seed-event-naples-pride-2026,/cancun/events/cancun-pride-march-2026--seed-event-cancun-pride-march-2026,/phnom_penh/events/pride-fest-cambodia-2026--seed-event-phnompenh-pride-fest-2026
          EVENT_ENTITY_TEST_MIN_PASSING: 5
        run: npm run test:event-entity-e2e

      - name: Stop app
        if: always()
        run: |
          if [ -n "${APP_PID:-}" ]; then
            kill "$APP_PID" || true
          fi
