name: Release Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify-release:
    name: Verify Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run verify:release

      - name: Upload SEO weekly report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: seo-health-weekly-report
          path: reports/seo-health-weekly-latest.md
          if-no-files-found: warn

      - name: Export SEO health JSON snapshot
        if: always()
        continue-on-error: true
        run: |
          mkdir -p reports
          node scripts/seo-health-report.mjs --json > reports/seo-health-latest.json

      - name: Upload SEO health JSON artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: seo-health-json-snapshot
          path: reports/seo-health-latest.json
          if-no-files-found: warn
