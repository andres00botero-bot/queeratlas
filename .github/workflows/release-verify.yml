name: Release Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  verify-release:
    name: Verify Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run verify:release
