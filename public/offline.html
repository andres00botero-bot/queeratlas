<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Queer Atlas</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #070707;
        color: #f3f4f6;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
      }
      main {
        width: min(92vw, 34rem);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 1.25rem;
        padding: 1.25rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.2rem;
      }
      p {
        margin: 0;
        color: rgba(243, 244, 246, 0.84);
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>Queer Atlas could not reach the network. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
